<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Watcher Card Preview</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          "SF Pro Display",
          "PingFang SC",
          "Microsoft YaHei",
          sans-serif;
        background:
          radial-gradient(circle at top, rgba(245, 158, 11, 0.08), transparent 35%),
          linear-gradient(180deg, #0f172a 0%, #1e293b 48%, #0f172a 100%);
        color: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 40px 20px 56px;
      }

      main {
        width: min(960px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 18px;
      }

      .hero {
        display: grid;
        gap: 10px;
      }

      .eyebrow {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: #fbbf24;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        line-height: 1.1;
      }

      p {
        margin: 0;
        max-width: 56rem;
        color: #94a3b8;
        line-height: 1.6;
      }

      .tips {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .tip {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(71, 85, 105, 0.5);
        color: #cbd5e1;
        font-size: 0.9rem;
      }

      [data-preview-mode] {
        display: block;
      }

      .preview-mode-tip {
        display: grid;
        gap: 4px;
        border-radius: 16px;
        padding: 12px 14px;
      }

      .preview-request-tip {
        display: grid;
        gap: 4px;
        border-radius: 16px;
        padding: 12px 14px;
      }

      .preview-mode-tip strong {
        font-size: 0.92rem;
        color: #fbbf24;
      }

      .preview-mode-tip span {
        color: #94a3b8;
        line-height: 1.5;
      }

      .preview-request-tip strong {
        font-size: 0.92rem;
      }

      .preview-request-tip span {
        line-height: 1.5;
      }

      .preview-request-tip.tone-muted strong,
      .preview-request-tip.tone-muted span {
        color: #64748b;
      }

      .preview-request-tip.tone-success strong {
        color: #4ade80;
      }

      .preview-request-tip.tone-success span {
        color: #22c55e;
      }

      .preview-request-tip.tone-error strong {
        color: #f87171;
      }

      .preview-request-tip.tone-error span {
        color: #ef4444;
      }

      .preview-shell {
        padding: 18px;
        border-radius: 28px;
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(51, 65, 85, 0.8);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
      }

      [data-preview-root] {
        display: block;
      }

      @media (max-width: 640px) {
        body {
          padding: 24px 14px 40px;
        }

        .preview-shell {
          padding: 12px;
          border-radius: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="eyebrow">Local Preview</div>
        <h1>Kanban Watcher Card 本地预览</h1>
        <div data-preview-mode></div>
        <div data-preview-request></div>
      </section>

      <section class="preview-shell">
        <div data-preview-root></div>
      </section>
    </main>

    <script type="module" src="/src/playground.ts"></script>
  </body>
</html>
