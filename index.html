<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Watcher Card Preview</title>
    <style>
      :root {
        --bg-gradient-1: rgba(245, 158, 11, 0.08);
        --bg-gradient-2: #0f172a;
        --bg-gradient-3: #1e293b;
        --text-primary: #e2e8f0;
        --text-secondary: #94a3b8;
        --eyebrow-color: #fbbf24;
        --tip-bg: rgba(30, 41, 59, 0.7);
        --tip-border: rgba(71, 85, 105, 0.5);
        --tip-text: #cbd5e1;
        --shell-bg: rgba(30, 41, 59, 0.7);
        --shell-border: rgba(51, 65, 85, 0.8);
        --shell-shadow: rgba(0, 0, 0, 0.3);
        --success-color: #4ade80;
        --success-text: #22c55e;
        --error-color: #f87171;
        --error-text: #ef4444;
        --muted-color: #64748b;

        /* Home Assistant CSS Variables - Dark Mode */
        --ha-card-background: #1e293b;
        --card-background-color: #1e293b;
        --primary-text-color: #e2e8f0;
        --secondary-text-color: #94a3b8;
        --divider-color: #334155;
        --secondary-background-color: #0f172a;
        --primary-color: #f59e0b;
        --warning-color: #fbbf24;
        --error-color: #ef4444;
        --success-color: #34d399;
        --ha-card-box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);

        color-scheme: dark;
        font-family:
          "SF Pro Display",
          "PingFang SC",
          "Microsoft YaHei",
          sans-serif;
        background:
          radial-gradient(circle at top, var(--bg-gradient-1), transparent 35%),
          linear-gradient(180deg, var(--bg-gradient-2) 0%, var(--bg-gradient-3) 48%, var(--bg-gradient-2) 100%);
        color: var(--text-primary);
      }

      :root.light-mode {
        --bg-gradient-1: rgba(245, 158, 11, 0.18);
        --bg-gradient-2: #fffaf0;
        --bg-gradient-3: #f8fafc;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --eyebrow-color: #b45309;
        --tip-bg: rgba(255, 255, 255, 0.7);
        --tip-border: rgba(148, 163, 184, 0.3);
        --tip-text: #334155;
        --shell-bg: rgba(255, 255, 255, 0.7);
        --shell-border: rgba(226, 232, 240, 0.8);
        --shell-shadow: rgba(15, 23, 42, 0.08);
        --success-color: #166534;
        --success-text: #15803d;
        --error-color: #b91c1c;
        --error-text: #991b1b;
        --muted-color: #475569;

        /* Home Assistant CSS Variables - Light Mode */
        --ha-card-background: #ffffff;
        --card-background-color: #ffffff;
        --primary-text-color: #0f172a;
        --secondary-text-color: #64748b;
        --divider-color: #e5e7eb;
        --secondary-background-color: #f3f4f6;
        --primary-color: #f59e0b;
        --warning-color: #fbbf24;
        --error-color: #ef4444;
        --success-color: #34d399;
        --ha-card-box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);

        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 40px 20px 56px;
      }

      main {
        width: min(960px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 18px;
      }

      .hero {
        display: grid;
        gap: 10px;
      }

      .hero-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      .eyebrow {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--eyebrow-color);
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        line-height: 1.1;
      }

      p {
        margin: 0;
        max-width: 56rem;
        color: var(--text-secondary);
        line-height: 1.6;
      }

      .tips {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .tip {
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--tip-bg);
        border: 1px solid var(--tip-border);
        color: var(--tip-text);
        font-size: 0.9rem;
      }

      [data-preview-mode] {
        display: block;
      }

      .preview-mode-tip {
        display: grid;
        gap: 4px;
        border-radius: 16px;
        padding: 12px 14px;
      }

      .preview-request-tip {
        display: grid;
        gap: 4px;
        border-radius: 16px;
        padding: 12px 14px;
      }

      .preview-mode-tip strong {
        font-size: 0.92rem;
        color: var(--eyebrow-color);
      }

      .preview-mode-tip span {
        color: var(--text-secondary);
        line-height: 1.5;
      }

      .preview-request-tip strong {
        font-size: 0.92rem;
      }

      .preview-request-tip span {
        line-height: 1.5;
      }

      .preview-request-tip.tone-muted strong,
      .preview-request-tip.tone-muted span {
        color: var(--muted-color);
      }

      .preview-request-tip.tone-success strong {
        color: var(--success-color);
      }

      .preview-request-tip.tone-success span {
        color: var(--success-text);
      }

      .preview-request-tip.tone-error strong {
        color: var(--error-color);
      }

      .preview-request-tip.tone-error span {
        color: var(--error-text);
      }

      .preview-shell {
        padding: 18px;
        border-radius: 28px;
        background: var(--shell-bg);
        border: 1px solid var(--shell-border);
        box-shadow: 0 24px 60px var(--shell-shadow);
      }

      [data-preview-root] {
        display: block;
      }

      /* 主题切换按钮 */
      .theme-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        border-radius: 999px;
        background: var(--tip-bg);
        border: 1px solid var(--tip-border);
        color: var(--tip-text);
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .theme-toggle:hover {
        opacity: 0.85;
      }

      .theme-toggle-icon {
        font-size: 1.1rem;
      }

      @media (max-width: 640px) {
        body {
          padding: 24px 14px 40px;
        }

        .preview-shell {
          padding: 12px;
          border-radius: 20px;
        }

        .hero-header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="hero-header">
          <div class="eyebrow">Local Preview</div>
          <button class="theme-toggle" id="themeToggle">
            <span class="theme-toggle-icon">🌙</span>
            <span class="theme-toggle-label">切换明亮模式</span>
          </button>
        </div>
        <h1>Kanban Watcher Card 本地预览</h1>
        <div data-preview-mode></div>
        <div data-preview-request></div>
      </section>

      <section class="preview-shell">
        <div data-preview-root></div>
      </section>
    </main>

    <script>
      // 主题切换逻辑
        const root = document.documentElement;
        const toggle = document.getElementById('themeToggle');
        const icon = toggle.querySelector('.theme-toggle-icon');
        const label = toggle.querySelector('.theme-toggle-label');

        // 从 localStorage 读取主题偏好，默认暗黑模式
        const savedTheme = localStorage.getItem('preview-theme') || 'dark';
        if (savedTheme === 'light') {
          root.classList.add('light-mode');
          icon.textContent = '☀️';
          label.textContent = '切换暗黑模式';
        }

        toggle.addEventListener('click', () => {
          const isLight = root.classList.toggle('light-mode');
          if (isLight) {
            icon.textContent = '☀️';
            label.textContent = '切换暗黑模式';
            localStorage.setItem('preview-theme', 'light');
          } else {
            icon.textContent = '🌙';
            label.textContent = '切换明亮模式';
            localStorage.setItem('preview-theme', 'dark');
          }
        });
      })();
    </script>

    <script type="module" src="/src/playground.ts"></script>
  </body>
</html>
