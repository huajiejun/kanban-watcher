# HomeAssistant 可折叠 Kanban 看板 v2
# 只使用 fold-entity-row + template-entity-row（无需 auto-entities）
# 需要安装：fold-entity-row, template-entity-row, card-mod

type: vertical-stack
cards:
  - type: markdown
    content: |
      ## 📊 Kanban 工作区监控

  # ========== 需要注意 ==========
  - type: entities
    title: 🔴 需要注意
    entities:
      - type: custom:fold-entity-row
        head:
          type: custom:template-entity-row
          entity: sensor.kanban_watcher_kanban_watcher
          name: 需要关注的任务
          state: "{{ state_attr('sensor.kanban_watcher_kanban_watcher', 'workspaces') | selectattr('needs_attention', 'equalto', true) | list | length }} 个"
          icon: mdi:alert-circle
          card_mod:
            style: |
              :host {
                --card-background-color: #ffebee;
                border-left: 4px solid #f44336;
                border-radius: 8px;
                margin: 4px 0;
              }
              .name {
                font-weight: bold;
                color: #d32f2f;
              }
        items:
          - type: custom:template-entity-row
            entity: sensor.kanban_watcher_kanban_watcher
            name: "{{ state_attr('sensor.kanban_watcher_kanban_watcher', 'workspaces') | selectattr('needs_attention', 'equalto', true) | map(attribute='name') | list | join(', ') | default('无') }}"
            state: "{{ (state_attr('sensor.kanban_watcher_kanban_watcher', 'workspaces') | selectattr('needs_attention', 'equalto', true) | first).relative_time | default('') }}"
            secondary: "需要关注"
            card_mod:
              style: |
                :host {
                  display: {{ 'block' if (state_attr('sensor.kanban_watcher_kanban_watcher', 'workspaces') | selectattr('needs_attention', 'equalto', true) | list | length) > 0 else 'none' }};
                }
    card_mod:
      style: |
        ha-card {
          background: linear-gradient(135deg, #ffebee, #ffcdd2);
          border-radius: 12px;
        }

  # ========== 运行中 ==========
  - type: entities
    title: 🟡 运行中
    entities:
      - type: custom:fold-entity-row
        head:
          type: custom:template-entity-row
          entity: sensor.kanban_watcher_kanban_watcher
          name: 运行中的任务
          state: "{{ state_attr('sensor.kanban_watcher_kanban_watcher', 'workspaces') | selectattr('status', 'equalto', 'running') | rejectattr('needs_attention', 'equalto', true) | list | length }} 个"
          icon: mdi:play-circle
          card_mod:
            style: |
              :host {
                --card-background-color: #fff8e1;
                border-left: 4px solid #ffc107;
                border-radius: 8px;
                margin: 4px 0;
              }
              .name {
                font-weight: bold;
                color: #f57c00;
              }
        items:
          - type: custom:template-entity-row
            entity: sensor.kanban_watcher_kanban_watcher
            name: "{{ state_attr('sensor.kanban_watcher_kanban_watcher', 'workspaces') | selectattr('status', 'equalto', 'running') | rejectattr('needs_attention', 'equalto', true) | map(attribute='name') | list | join(', ') | default('无') }}"
            state: "进行中"
            icon: mdi:play-circle
    card_mod:
      style: |
        ha-card {
          background: linear-gradient(135deg, #fff8e1, #ffecb3);
          border-radius: 12px;
        }

  # ========== 已完成 ==========
  - type: entities
    title: 🟢 已完成
    entities:
      - type: custom:fold-entity-row
        head:
          type: custom:template-entity-row
          entity: sensor.kanban_watcher_kanban_watcher
          name: 已完成的任务
          state: "{{ state_attr('sensor.kanban_watcher_kanban_watcher', 'workspaces') | selectattr('status', 'equalto', 'completed') | rejectattr('needs_attention', 'equalto', true) | list | length }} 个"
          icon: mdi:check-circle
          card_mod:
            style: |
              :host {
                --card-background-color: #e8f5e9;
                border-left: 4px solid #4caf50;
                border-radius: 8px;
                margin: 4px 0;
              }
              .name {
                font-weight: bold;
                color: #388e3c;
              }
        items:
          - type: custom:template-entity-row
            entity: sensor.kanban_watcher_kanban_watcher
            name: "{{ state_attr('sensor.kanban_watcher_kanban_watcher', 'workspaces') | selectattr('status', 'equalto', 'completed') | rejectattr('needs_attention', 'equalto', true) | map(attribute='name') | list | join(', ') | default('无') }}"
            state: "完成"
            icon: mdi:check-circle
    card_mod:
      style: |
        ha-card {
          background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
          border-radius: 12px;
        }
