# HomeAssistant Button Card 配置（带空值保护）
# 安装 button-card 后使用此配置

type: custom:button-card
entity: sensor.kanban_watcher_summary
name: Kanban 工作区
icon: mdi:layers-triple
show_state: true
show_units: false
tap_action:
  action: more-info
styles:
  card:
    - height: 120px
    - background: |
        [[[
          // 空值保护：确保 entity 和 attributes 存在
          if (!entity || !entity.attributes)
            return 'linear-gradient(135deg, #74b9ff, #0984e3)';
          if (entity.attributes.attention_count > 0)
            return 'linear-gradient(135deg, #ff6b6b, #ee5a24)';
          return 'linear-gradient(135deg, #74b9ff, #0984e3)';
        ]]]
    - color: white
  icon:
    - color: white
  name:
    - color: white
    - font-size: 16px
    - font-weight: bold
  state:
    - color: white
    - font-size: 24px
    - font-weight: bold
custom_fields:
  attention: |
    [[[
      // 空值保护检查
      if (!entity || !entity.attributes) {
        return '<span style="color: white; font-size: 12px;">⏳ 加载中...</span>';
      }

      var count = entity.attributes.attention_count || 0;
      var total = entity.attributes.count || 0;

      if (count > 0) {
        return `<span style="color: white; font-size: 12px;">
          ⚠️ ${count} 个需要关注
        </span>`;
      }
      return '<span style="color: white; font-size: 12px;">✓ 所有任务正常</span>';
    ]]]
extra_styles: |
  [[[
    // 空值保护检查
    if (!entity || !entity.attributes) return '';

    if (entity.attributes.attention_count > 0) {
      return `
        @keyframes pulse {
          0% { box-shadow: 0 0 0 0 rgba(238, 90, 36, 0.4); }
          70% { box-shadow: 0 0 0 10px rgba(238, 90, 36, 0); }
          100% { box-shadow: 0 0 0 0 rgba(238, 90, 36, 0); }
        }
        .card {
          animation: pulse 2s infinite;
        }
      `;
    }
  ]]]
