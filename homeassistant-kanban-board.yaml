# HomeAssistant 三栏式 Kanban 看板卡片
# 显示：需要注意 | 运行中 | 已完成
# 每个栏目下显示对应任务和相对时间

type: horizontal-stack
cards:
  # ========== 第一栏：需要注意 ==========
  - type: markdown
    content: |
      ## 🔴 需要注意
      {% set workspaces = state_attr('sensor.kanban_watcher_kanban_watcher', 'workspaces') or [] %}
      {% set attention_ws = workspaces | selectattr('needs_attention', 'equalto', true) | list %}

      **{{ attention_ws | length }} 个任务**

      {% for ws in attention_ws %}
      ---
      ### {{ ws.name }}
      {% if ws.has_pending_approval %}⏳ 待审批{% endif %}
      {% if ws.has_unseen_turns %}🔔 未读消息{% endif %}
      {% endfor %}

      {% if attention_ws | length == 0 %}
      *暂无需要关注的任务*
      {% endif %}
    card_mod:
      style: |
        ha-card {
          background: linear-gradient(135deg, #ff6b6b, #ee5a24);
          color: white;
          border-radius: 12px;
          padding: 16px;
          min-height: 300px;
        }
        h2 {
          margin: 0 0 16px 0;
          font-size: 18px;
          text-align: center;
          border-bottom: 2px solid rgba(255,255,255,0.3);
          padding-bottom: 8px;
        }
        h3 {
          margin: 8px 0;
          font-size: 14px;
          color: white;
        }
        hr {
          border: none;
          border-top: 1px solid rgba(255,255,255,0.3);
          margin: 8px 0;
        }

  # ========== 第二栏：运行中 ==========
  - type: markdown
    content: |
      ## 🟡 运行中
      {% set workspaces = state_attr('sensor.kanban_watcher_kanban_watcher', 'workspaces') or [] %}
      {% set running_ws = workspaces | selectattr('status', 'equalto', 'running') | list %}

      **{{ running_ws | length }} 个任务**

      {% for ws in running_ws %}
      ---
      ### ▶️ {{ ws.name }}
      {% if ws.files_changed %}📝 {{ ws.files_changed }} 文件{% endif %}
      {% if ws.lines_added %}+{{ ws.lines_added }}{% endif %}
      {% if ws.lines_removed %}-{{ ws.lines_removed }}{% endif %}
      {% endfor %}

      {% if running_ws | length == 0 %}
      *暂无运行中的任务*
      {% endif %}
    card_mod:
      style: |
        ha-card {
          background: linear-gradient(135deg, #f1c40f, #f39c12);
          color: white;
          border-radius: 12px;
          padding: 16px;
          min-height: 300px;
        }
        h2 {
          margin: 0 0 16px 0;
          font-size: 18px;
          text-align: center;
          border-bottom: 2px solid rgba(255,255,255,0.3);
          padding-bottom: 8px;
        }
        h3 {
          margin: 8px 0;
          font-size: 14px;
          color: white;
        }
        hr {
          border: none;
          border-top: 1px solid rgba(255,255,255,0.3);
          margin: 8px 0;
        }

  # ========== 第三栏：已完成 ==========
  - type: markdown
    content: |
      ## 🟢 已完成
      {% set workspaces = state_attr('sensor.kanban_watcher_kanban_watcher', 'workspaces') or [] %}
      {% set completed_ws = workspaces | selectattr('status', 'equalto', 'completed') | list %}

      **{{ completed_ws | length }} 个任务**

      {% for ws in completed_ws %}
      ---
      ### ✅ {{ ws.name }}
      {% if ws.completed_at %}
      {% set completed = strptime(ws.completed_at[:19], '%Y-%m-%dT%H:%M:%S') %}
      {% set now = now() %}
      {% set diff = (now - completed).total_seconds() // 3600 %}
      {% if diff < 1 %}
      {% set diff = (now - completed).total_seconds() // 60 %}
      ⏱️ {{ diff | int }} 分钟前
      {% elif diff < 24 %}
      ⏱️ {{ diff | int }} 小时前
      {% else %}
      {% set diff = diff // 24 %}
      ⏱️ {{ diff | int }} 天前
      {% endif %}
      {% endif %}
      {% if ws.pr_url %}
      🔗 [PR链接]({{ ws.pr_url }})
      {% endif %}
      {% endfor %}

      {% if completed_ws | length == 0 %}
      *暂无已完成的任务*
      {% endif %}
    card_mod:
      style: |
        ha-card {
          background: linear-gradient(135deg, #2ecc71, #27ae60);
          color: white;
          border-radius: 12px;
          padding: 16px;
          min-height: 300px;
        }
        h2 {
          margin: 0 0 16px 0;
          font-size: 18px;
          text-align: center;
          border-bottom: 2px solid rgba(255,255,255,0.3);
          padding-bottom: 8px;
        }
        h3 {
          margin: 8px 0;
          font-size: 14px;
          color: white;
        }
        hr {
          border: none;
          border-top: 1px solid rgba(255,255,255,0.3);
          margin: 8px 0;
        }
        a {
          color: white !important;
          text-decoration: underline;
          font-size: 12px;
        }
