# =====================================================
# Kanban Watcher 前后端共享 Nginx 代理
#
# 访问方式：
#   http://your-domain:2453/6020/                  → 127.0.0.1:6020/
#   http://your-domain:2453/6020/api/info          → 127.0.0.1:16020/api/info
#   ws://your-domain:2453/6020/api/realtime/ws     → 127.0.0.1:16020/api/realtime/ws
#
# 规则：
# - 页面和静态资源走前端端口本身
# - /api 与 WebSocket 走对应后端端口
# - 默认后端端口 = 1 + 前端端口（6020 -> 16020）
# - 特殊兼容：7779 -> 7778
# =====================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_referer $referer_frontend_port {
    default "";
    ~^https?://[^/]+/([0-9][0-9][0-9][0-9][0-9]?)(?:/|$) $1;
}

server {
    listen 2453;
    server_name _;

    # 访问日志
    access_log /opt/homebrew/var/log/nginx/dynamic-proxy.access.log;
    error_log /opt/homebrew/var/log/nginx/dynamic-proxy.error.log;

    # API / WebSocket 代理到后端
    location ~ "^/([0-9]{4,5})/api(?<backend_path>/.*)?$" {
        set $frontend_port $1;
        set $backend_port 1$frontend_port;
        if ($frontend_port = 7779) {
            set $backend_port 7778;
        }
        if ($backend_path = "") {
            set $backend_path /;
        }

        proxy_pass http://127.0.0.1:$backend_port/api$backend_path$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host 127.0.0.1:$backend_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲设置
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 前端页面与静态资源代理到对应前端端口
    location ~ "^/([0-9]{4,5})(?<frontend_path>/.*)?$" {
        set $frontend_port $1;
        if ($frontend_path = "") {
            set $frontend_path /;
        }

        proxy_pass http://127.0.0.1:$frontend_port$frontend_path$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host 127.0.0.1:$frontend_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Vite 开发态根路径资源会丢失前端端口前缀，按 Referer 回推到对应前端服务
    location ~ "^/(?:@vite/|src/|node_modules/)" {
        if ($referer_frontend_port = "") {
            return 404;
        }

        proxy_pass http://127.0.0.1:$referer_frontend_port$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host 127.0.0.1:$referer_frontend_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 'OK\n';
        add_header Content-Type text/plain;
    }

    # Nginx 状态页面（可选，用于监控）
    location /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # 默认处理
    location / {
        default_type application/json;
        return 404 '{"error": "请使用格式: /前端端口/路径，例如 /6020/ 或 /6020/api/info"}';
    }
}
