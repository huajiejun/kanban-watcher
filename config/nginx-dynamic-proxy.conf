# =====================================================
# Nginx 动态端口代理配置
# 方案二：通过路径中的端口号动态代理到对应后端
#
# 访问方式：
#   http://your-domain:2453/18001/api/test  → 127.0.0.1:18001/api/test
#   http://your-domain:2453/18500/          → 127.0.0.1:18500/
# =====================================================

server {
    listen 2453;
    server_name _;

    # 访问日志
    access_log /opt/homebrew/var/log/nginx/dynamic-proxy.access.log;
    error_log /opt/homebrew/var/log/nginx/dynamic-proxy.error.log;

    # 动态端口代理 - 核心规则
    # 匹配格式: /端口号/路径
    # 端口号必须是5位数字 (18000-19000)
    location ~ "^/([0-9]{5})(/.*)?$" {
        set $backend_port $1;
        set $backend_path $2;

        # 如果路径为空，设置为根路径
        if ($backend_path = "") {
            set $backend_path "/";
        }

        proxy_pass http://127.0.0.1:$backend_port$backend_path;
        proxy_http_version 1.1;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 基础代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲设置
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 'OK\n';
        add_header Content-Type text/plain;
    }

    # Nginx 状态页面（可选，用于监控）
    location /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # 默认处理
    location / {
        default_type application/json;
        return 404 '{"error": "请使用格式: /端口号/路径，例如 /18001/api/test"}';
    }
}
