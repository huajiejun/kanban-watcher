# =====================================================
# FRP 客户端配置
# 用于将内网服务穿透到公网
# =====================================================

[common]
# FRP 服务器地址（替换为你的frp服务器地址）
server_addr = your-frp-server.com
server_addr = 127.0.0.1

# FRP 服务器端口
server_port = 7000

# 认证方式
authentication_method = token
token = your_token_here

# 日志配置
log_file = /var/log/frpc.log
log_level = info

# =====================================================
# TCP 穿透配置 - 方案二：只穿透一个端口
# =====================================================

# 穿透 nginx 动态代理端口
[nginx-dynamic-proxy]
type = tcp
local_ip = 127.0.0.1
local_port = 2453
remote_port = 2453

# =====================================================
# 如果需要穿透多个独立端口（备选方案）
# 可以添加多个配置
# =====================================================

# [direct-port-18001]
# type = tcp
# local_ip = 127.0.0.1
# local_port = 18001
# remote_port = 18001
