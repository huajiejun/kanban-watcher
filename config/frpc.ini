# =====================================================
# FRP 客户端配置 - 测试版
# 只测试 kw.huajiejun.cn:777 -> 127.0.0.1:7779
# =====================================================

[common]
server_addr = home.huajiejun.cn
server_port = 7000
authentication_method = token
token = your_secure_token_here
log_level = info

# =====================================================
# HTTPS 服务穿透
# =====================================================

[kw-service]
type = https
local_ip = 127.0.0.1
local_port = 7779
custom_domains = kw.huajiejun.cn
