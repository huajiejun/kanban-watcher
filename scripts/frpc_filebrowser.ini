[common]
server_addr = your-frp-server-ip
server_port = 7000
token = your-token-here

# File Browser HTTP 服务
[filebrowser-web]
type = http
local_ip = 127.0.0.1
local_port = 9394
custom_domains = files.your-domain.com
# 如果FRP服务器需要设置主机头
host_header_rewrite = files.your-domain.com

# 如果需要TCP模式（适用于无域名场景）
[filebrowser-tcp]
type = tcp
local_ip = 127.0.0.1
local_port = 9394
remote_port = 8080