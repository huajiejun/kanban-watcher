# HomeAssistant 原生可折叠 Kanban 看板
# 使用 HTML5 <details> 标签实现折叠，无需任何插件！

type: markdown
content: |
  ## 📊 Kanban 工作区监控
  <small>点击标题展开/折叠</small>

  {% set workspaces = state_attr('sensor.kanban_watcher_kanban_watcher', 'workspaces') or [] %}

  <details style="margin: 12px 0; background: linear-gradient(135deg, #ffebee, #ffcdd2); border-radius: 12px; overflow: hidden;">
    <summary style="padding: 16px; font-weight: bold; color: #d32f2f; font-size: 16px; cursor: pointer; list-style: none;">
      🔴 需要注意 ({{ workspaces | selectattr('needs_attention', 'equalto', true) | list | length }})
    </summary>
    <div style="padding: 0 16px 16px 16px;">
      {% for ws in workspaces if ws.needs_attention %}
      <div style="background: white; margin: 8px 0; padding: 12px; border-radius: 8px; border-left: 4px solid #f44336;">
        <div style="font-weight: bold; font-size: 15px; color: #c62828; margin-bottom: 6px;">
          🚨 {{ ws.name }}
        </div>
        <div style="font-size: 13px; color: #555;">
          ⏰ {{ ws.relative_time }}
          {% if ws.has_pending_approval %}| ✋ 待审批{% endif %}
          {% if ws.has_unseen_turns %}| 👁️ 未读{% endif %}
        </div>
        <div style="font-size: 12px; color: #999; margin-top: 4px;">
          📝 {{ ws.files_changed or 0 }} 文件
          📈 {{ ws.lines_added or 0 }} 行
          📉 {{ ws.lines_removed or 0 }} 行
        </div>
      </div>
      {% endfor %}
    </div>
  </details>

  <details style="margin: 12px 0; background: linear-gradient(135deg, #fff8e1, #ffecb3); border-radius: 12px; overflow: hidden;">
    <summary style="padding: 16px; font-weight: bold; color: #f57c00; font-size: 16px; cursor: pointer; list-style: none;">
      🟡 运行中 ({{ workspaces | selectattr('status', 'equalto', 'running') | rejectattr('needs_attention', 'equalto', true) | list | length }})
    </summary>
    <div style="padding: 0 16px 16px 16px;">
      {% for ws in workspaces if ws.status == 'running' and not ws.needs_attention %}
      <div style="background: white; margin: 8px 0; padding: 12px; border-radius: 8px; border-left: 4px solid #ffc107;">
        <div style="font-weight: bold; font-size: 15px; color: #ef6c00; margin-bottom: 6px;">
          ▶️ {{ ws.name }}
        </div>
        <div style="font-size: 13px; color: #555;">
          ⏰ {{ ws.relative_time }} | ▶️ 进行中
        </div>
        <div style="font-size: 12px; color: #999; margin-top: 4px;">
          📝 {{ ws.files_changed or 0 }} 文件
          📈 {{ ws.lines_added or 0 }} 行
          📉 {{ ws.lines_removed or 0 }} 行
        </div>
      </div>
      {% endfor %}
    </div>
  </details>

  <details style="margin: 12px 0; background: linear-gradient(135deg, #e8f5e9, #c8e6c9); border-radius: 12px; overflow: hidden;">
    <summary style="padding: 16px; font-weight: bold; color: #388e3c; font-size: 16px; cursor: pointer; list-style: none;">
      🟢 已完成 ({{ workspaces | selectattr('status', 'equalto', 'completed') | rejectattr('needs_attention', 'equalto', true) | list | length }})
    </summary>
    <div style="padding: 0 16px 16px 16px;">
      {% for ws in workspaces if ws.status == 'completed' and not ws.needs_attention %}
      <div style="background: white; margin: 8px 0; padding: 12px; border-radius: 8px; border-left: 4px solid #4caf50;">
        <div style="font-weight: bold; font-size: 15px; color: #2e7d32; margin-bottom: 6px;">
          ✅ {{ ws.name }}
        </div>
        <div style="font-size: 13px; color: #555;">
          ⏰ {{ ws.relative_time }}
          {% if ws.pr_url %}| 🔗 PR{% endif %}
        </div>
        <div style="font-size: 12px; color: #999; margin-top: 4px;">
          📝 {{ ws.files_changed or 0 }} 文件
          📈 {{ ws.lines_added or 0 }} 行
          📉 {{ ws.lines_removed or 0 }} 行
        </div>
      </div>
      {% endfor %}
    </div>
  </details>
