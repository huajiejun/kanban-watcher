# HomeAssistant 状态分组卡片配置
# 显示4个状态分类：需要注意、运行中、已完成、其他

type: horizontal-stack
cards:
  - type: markdown
    content: |
      {% set workspaces = state_attr('sensor.kanban_watcher_kanban_watcher', 'workspaces') or [] %}
      {% set attention = workspaces | selectattr('needs_attention', 'equalto', true) | list | length %}

      ## 🔴 {{ attention }}
      需要注意
    card_mod:
      style: |
        ha-card {
          background: {{ '#ff6b6b' if attention > 0 else '#e0e0e0' }};
          color: white;
          text-align: center;
          padding: 16px;
          border-radius: 12px;
          box-shadow: {{ '0 4px 8px rgba(255,107,107,0.4)' if attention > 0 else 'none' }};
        }

  - type: markdown
    content: |
      {% set workspaces = state_attr('sensor.kanban_watcher_kanban_watcher', 'workspaces') or [] %}
      {% set running = workspaces | selectattr('status', 'equalto', 'running') | list | length %}

      ## 🟡 {{ running }}
      运行中
    card_mod:
      style: |
        ha-card {
          background: {{ '#f1c40f' if running > 0 else '#e0e0e0' }};
          color: white;
          text-align: center;
          padding: 16px;
          border-radius: 12px;
          box-shadow: {{ '0 4px 8px rgba(241,196,15,0.4)' if running > 0 else 'none' }};
        }

  - type: markdown
    content: |
      {% set workspaces = state_attr('sensor.kanban_watcher_kanban_watcher', 'workspaces') or [] %}
      {% set completed = workspaces | selectattr('status', 'equalto', 'completed') | list | length %}

      ## 🟢 {{ completed }}
      已完成
    card_mod:
      style: |
        ha-card {
          background: {{ '#2ecc71' if completed > 0 else '#e0e0e0' }};
          color: white;
          text-align: center;
          padding: 16px;
          border-radius: 12px;
          box-shadow: {{ '0 4px 8px rgba(46,204,113,0.4)' if completed > 0 else 'none' }};
        }

  - type: markdown
    content: |
      {% set workspaces = state_attr('sensor.kanban_watcher_kanban_watcher', 'workspaces') or [] %}
      {% set other = workspaces | rejectattr('status', 'in', ['running', 'completed']) | rejectattr('needs_attention', 'equalto', true) | list | length %}

      ## ⚪ {{ other }}
      其他
    card_mod:
      style: |
        ha-card {
          background: #95a5a6;
          color: white;
          text-align: center;
          padding: 16px;
          border-radius: 12px;
        }
